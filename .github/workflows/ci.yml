name: CI/CD Pipeline — Alumnos API (Gradle)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/alumnos-app

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: BUILD & TEST
# Compila el proyecto, ejecuta todos los tests y verifica cobertura ≥ 80%
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para SonarCloud (análisis de historial)

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permisos al gradlew
        run: chmod +x gradlew

      - name: Compilar y ejecutar todos los tests
        run: ./gradlew clean check jacocoTestReport -Dnet.bytebuddy.experimental=true
        # check ejecuta: test → jacocoTestReport → jacocoTestCoverageVerification (≥80%)

      - name: Publicar reporte de cobertura JaCoCo como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Publicar resultados de tests como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 7

      - name: Publicar reporte Cucumber como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: build/cucumber-reports/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: SECURITY — SonarCloud + Snyk
# Análisis estático de código y escaneo de vulnerabilidades en dependencias
# El pipeline se BLOQUEA si alguno falla
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build-and-test  # solo corre si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permisos al gradlew
        run: chmod +x gradlew

      - name: Compilar para análisis (sin tests)
        run: ./gradlew clean assemble -Dnet.bytebuddy.experimental=true

      # ── SAST: SonarCloud ──────────────────────────────────────────────────
      - name: Análisis SonarCloud (SAST)
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=alumnos-app \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml \
            -Dnet.bytebuddy.experimental=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # sonar.qualitygate.wait=true → el paso FALLA si el Quality Gate no pasa

      # ── SCA: Snyk (escaneo de dependencias) ───────────────────────────────
      - name: Escaneo de dependencias Snyk (SCA)
        uses: snyk/actions/gradle@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all
        # --fail-on=all → BLOQUEA el pipeline si hay vulnerabilidades high/critical

      - name: Publicar reporte Snyk como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-report
          path: snyk.sarif
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: DOCKER — Build y push de imagen al registry
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: security  # solo corre si seguridad pasa

    permissions:
      contents: read
      packages: write  # necesario para push a GHCR

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (para generar el jar)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permisos al gradlew
        run: chmod +x gradlew

      - name: Generar jar de producción
        run: ./gradlew clean bootJar -x test -Dnet.bytebuddy.experimental=true

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login a GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata para la imagen Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: DEPLOY — Despliegue automático con Docker Compose
# Solo se ejecuta en push a main (entorno de producción simulado)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Docker Compose)
    runs-on: ubuntu-latest
    needs: docker  # solo corre si la imagen fue publicada
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: http://localhost:8080

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permisos al gradlew
        run: chmod +x gradlew

      - name: Generar jar de producción
        run: ./gradlew clean bootJar -x test -Dnet.bytebuddy.experimental=true

      - name: Levantar entorno con Docker Compose
        run: docker compose up -d --build
        env:
          SPRING_PROFILES_ACTIVE: prod

      - name: Esperar que la aplicación esté healthy
        run: |
          echo "Esperando que la aplicación levante..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' alumnos-app 2>/dev/null || echo "starting")
            echo "Intento $i/12 — Estado: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Aplicación lista."
              exit 0
            fi
            sleep 10
          done
          echo "La aplicación no levantó en tiempo esperado."
          docker compose logs
          exit 1

      - name: Smoke test — verificar endpoint principal
        run: |
          curl -f http://localhost:8080/alumnos \
            -H "Accept: application/json" \
            --retry 3 --retry-delay 5
          echo "Smoke test OK"

      - name: Publicar logs del despliegue como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-logs
          path: /tmp/deploy-logs.txt
          retention-days: 3

      - name: Detener entorno Docker Compose (cleanup)
        if: always()
        run: docker compose down -v
